<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- `viewport-fit=cover` étend la page sous l'encoche et la barre de gestes ;
         les retraits sont repris en CSS par `env(safe-area-inset-*)`. Sans lui,
         la barre d'état translucide déclarée plus bas masquerait le bandeau. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Linkx</title>
    <meta
      name="description"
      content="Le jeu de plateau Linkx : posez vos pièces et reliez deux bords opposés, à deux sur le même écran ou contre l'ordinateur."
    />

    <!-- Application installable. Tous les chemins restent relatifs au document :
         le site est publié sous un sous-chemin (/linkx/). -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#f3f2ee" />

    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <!-- iOS n'implémente pas le manifeste : le plein écran, le titre et la
         barre d'état de l'icône d'accueil se déclarent par ces balises. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- `black-translucent` fait passer la page sous la barre d'état : le bandeau
         garde donc sa propre couleur jusqu'en haut de l'écran. Cette valeur n'est
         tenable qu'avec les retraits de zone sûre appliqués dans `App.css`. -->
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Linkx" />
    <script type="module" crossorigin src="./assets/index-0HyZUODf.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CxWnDhkw.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
